name: Cloud Sentinel Backend CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r services/api-gateway/requirements.txt
        pip install -r services/api-gateway/requirements-dev.txt

    - name: Lint with flake8
      run: |
        # Config is read from services/api-gateway/.flake8
        flake8 services/api-gateway --count --statistics

    - name: Check formatting with black
      run: |
        black --check services/api-gateway

    - name: Run tests with pytest
      env:
        SECRET_KEY: ${{ secrets.SECRET_KEY || 'ci-test-secret-key-123' }}
        ALGORITHM: HS256
        PYTHONPATH: .
      run: |
        cd services/api-gateway
        pytest
    
    - name: Verify Docker Build
      run: |
        docker build -t cloud-sentinel-api-gateway:ci services/api-gateway
