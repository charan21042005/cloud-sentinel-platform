apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: aws-parameter-store-production
  labels:
    platform.sentinel.io/governance: external-secrets
spec:
  provider:
    aws:
      service: ParameterStore
      region: us-east-1
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets-sa
            namespace: sentinel-ops
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: sync-api-gateway-credentials
  namespace: sentinel-apps
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-parameter-store-production
    kind: ClusterSecretStore
  target:
    name: api-gateway-external-credentials
    creationPolicy: Owner
  data:
    - secretKey: AUTH_JWT_SECRET
      remoteRef:
        key: /sentinel/production/api-gateway/jwt-secret
