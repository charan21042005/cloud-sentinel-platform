apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sentinel-workloads
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  project: default
  source:
    repoURL: 'https://github.com/charan21042005/cloud-sentinel-platform.git'
    targetRevision: HEAD
    path: infrastructure/kubernetes/workloads
  destination:
    server: 'https://kubernetes.default.svc'
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
