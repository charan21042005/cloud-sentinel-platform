apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sentinel-monitoring-ingress
  namespace: sentinel-monitoring
  labels:
    app.kubernetes.io/part-of: cloud-sentinel
  annotations:
    kubernetes.io/ingress.class: "sentinel-nginx"
    nginx.ingress.kubernetes.io/proxy-body-size: "8m"
spec:
  rules:
    - host: grafana.sentinel.ops.internal
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: kube-prometheus-stack-grafana
                port:
                  number: 80
                  
    - host: prometheus.sentinel.ops.internal
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: kube-prometheus-stack-prometheus
                port:
                  number: 9090
                  
    - host: alerts.sentinel.ops.internal
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: kube-prometheus-stack-alertmanager
                port:
                  number: 9093
