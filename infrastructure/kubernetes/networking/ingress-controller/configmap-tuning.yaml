apiVersion: v1
kind: ConfigMap
metadata:
  name: ingress-nginx-controller-tuning
  namespace: sentinel-ingress
  labels:
    app.kubernetes.io/name: ingress-nginx
    app.kubernetes.io/part-of: cloud-sentinel
data:
  # Real-Time WebSocket Connection Hardening Parameters
  proxy-read-timeout: "3600"
  proxy-send-timeout: "3600"
  proxy-connect-timeout: "15"
  keep-alive-requests: "10000"
  keep-alive: "3600"
  
  # Upstream Buffering Optimization & Payload Dropping Prevention
  proxy-buffer-size: "16k"
  proxy-buffers: "4 32k"
  proxy-busy-buffers-size: "64k"
  client-max-body-size: "16m"
  
  # Security Headers Standardization
  hsts: "true"
  hsts-include-subdomains: "true"
  hsts-max-age: "31536000"
  ssl-redirect: "true"
  
  # Observability-Aware Traffic Tracing (Phase 3E)
  enable-opentelemetry: "false" # Reserve advanced trace collection for external exporters
  generate-request-id: "true"
  log-format-upstream: '{"time":"$time_iso8601","remote_addr":"$remote_addr","x_forwarded_for":"$http_x_forwarded_for","request_id":"$req_id","remote_user":"$remote_user","bytes_sent":$bytes_sent,"request_time":$request_time,"status":$status,"vhost":"$host","request_proto":"$server_protocol","path":"$uri","request_query":"$args","request_length":$request_length,"duration":$request_time,"method":"$request_method","http_referrer":"$http_referer","http_user_agent":"$http_user_agent","upstream_name":"$proxy_upstream_name","upstream_addr":"$upstream_addr","upstream_response_time":$upstream_response_time}'
