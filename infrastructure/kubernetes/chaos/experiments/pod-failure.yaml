# Chaos Mesh API Template: PodKill Validation
apiVersion: chaos-mesh.org/v1alpha1
kind: PodChaos
metadata:
  name: api-gateway-pod-kill
  namespace: sentinel-chaos
spec:
  action: pod-kill
  mode: one
  selector:
    namespaces:
      - sentinel-apps
    labelSelectors:
      "app.kubernetes.io/name": "api-gateway"
  duration: "30s"
  scheduler:
    cron: "@every 5m"
---
# Chaos Mesh API Template: Observability Restart Resilience
apiVersion: chaos-mesh.org/v1alpha1
kind: PodChaos
metadata:
  name: prometheus-restart-survival
  namespace: sentinel-chaos
spec:
  action: pod-kill
  mode: fixed-percent
  value: "50"
  selector:
    namespaces:
      - sentinel-monitoring
    labelSelectors:
      "app.kubernetes.io/name": "prometheus"
  duration: "60s"
  scheduler:
    cron: "@every 15m"
