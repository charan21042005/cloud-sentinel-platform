apiVersion: v1
kind: ServiceAccount
metadata:
  name: chaos-agent
  namespace: sentinel-chaos
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: chaos-injector-role
  namespace: sentinel-apps
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: chaos-injector-binding
  namespace: sentinel-apps
subjects:
  - kind: ServiceAccount
    name: chaos-agent
    namespace: sentinel-chaos
roleRef:
  kind: Role
  name: chaos-injector-role
  apiGroup: rbac.authorization.k8s.io
