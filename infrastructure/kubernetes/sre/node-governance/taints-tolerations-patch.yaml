apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: prometheus-sentinel-prometheus
  namespace: sentinel-monitoring
spec:
  template:
    spec:
      tolerations:
        - key: "infrastructure.sentinel.io/dedicated"
          operator: "Equal"
          value: "observability"
          effect: "NoSchedule"
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: "node-role.kubernetes.io/observability"
                    operator: In
                    values:
                      - "true"
