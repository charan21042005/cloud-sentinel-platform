apiVersion: v1
kind: ConfigMap
metadata:
  name: kube-apiserver-audit-policy
  namespace: sentinel-ops
data:
  audit-policy.yaml: |
    apiVersion: audit.k8s.io/v1
    kind: Policy
    omitStages:
      - "RequestReceived"
    rules:
      # Log pod changes at RequestResponse level (captures who created/deleted pods)
      - level: RequestResponse
        resources:
        - group: ""
          resources: ["pods"]
      # Log RBAC changes at RequestResponse level (crucial for SOC2 compliance)
      - level: RequestResponse
        resources:
        - group: "rbac.authorization.k8s.io"
          resources: ["roles", "rolebindings", "clusterroles", "clusterrolebindings"]
      # Ignore noisy read-only endpoints to save storage costs
      - level: None
        users: ["system:kube-proxy"]
        verbs: ["watch"]
      - level: None
        nonResourceURLs: ["/healthz*", "/logs*", "/metrics*"]
      # Catch-all for metadata
      - level: Metadata
