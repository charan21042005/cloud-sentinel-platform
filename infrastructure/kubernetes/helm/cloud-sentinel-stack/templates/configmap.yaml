{{- if .Values.configMap }}
{{- if .Values.configMap.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "cloud-sentinel-stack.fullname" . }}-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cloud-sentinel-stack.labels" . | nindent 4 }}
data:
  {{- toYaml .Values.configMap.data | nindent 2 }}
{{- end }}
{{- end }}
