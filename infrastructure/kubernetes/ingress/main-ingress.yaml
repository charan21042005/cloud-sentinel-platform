apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sentinel-gateway-ingress
  namespace: platform-ops
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "8m"
spec:
  rules:
    - host: sentinel.ops.internal
      http:
        paths:
          # API traffic routes strictly to the Python backend
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: sentinel-backend-svc
                port:
                  number: 8000
          
          # All other traffic routes to the Next.js UI
          - path: /
            pathType: Prefix
            backend:
              service:
                name: sentinel-frontend-svc
                port:
                  number: 80
