apiVersion: v1
kind: ServiceAccount
metadata:
  name: external-dns
  namespace: sentinel-ingress
  annotations:
    # IAM Role for Service Accounts (IRSA) giving Route53 manipulation access
    eks.amazonaws.com/role-arn: arn:aws:iam::123456789012:role/SentinelExternalDNSRole
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: external-dns
rules:
  - apiGroups: [""]
    resources: ["services", "endpoints", "pods"]
    verbs: ["get", "watch", "list"]
  - apiGroups: ["extensions", "networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["get", "watch", "list"]
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["list", "watch"]
