apiVersion: v1
kind: Service
metadata:
  name: ingress-nginx-controller
  namespace: sentinel-ingress
  annotations:
    # Provision an AWS Network Load Balancer (NLB) for high-throughput L4 routing
    service.beta.kubernetes.io/aws-load-balancer-type: "external"
    service.beta.kubernetes.io/aws-load-balancer-nlb-target-type: "ip"
    service.beta.kubernetes.io/aws-load-balancer-scheme: "internet-facing"
    # Offload TLS termination to ACM if necessary, or pass through to NGINX
    service.beta.kubernetes.io/aws-load-balancer-ssl-cert: "arn:aws:acm:us-east-1:123456789012:certificate/placeholder"
    service.beta.kubernetes.io/aws-load-balancer-ssl-ports: "https"
    # Connect directly to the AWS WAF WebACL for edge defense
    service.beta.kubernetes.io/aws-load-balancer-waf-acl-id: "arn:aws:wafv2:us-east-1:123456789012:regional/webacl/SentinelWAF/placeholder"
spec:
  type: LoadBalancer
