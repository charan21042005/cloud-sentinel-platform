apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: sentinel-monitoring
  labels:
    app.kubernetes.io/name: grafana
spec:
  replicas: 1
  strategy:
    type: Recreate # GP3 ReadWriteOnce binding constraints across dynamic scheduling blocks
  selector:
    matchLabels:
      app.kubernetes.io/name: grafana
  template:
    metadata:
      labels:
        app.kubernetes.io/name: grafana
    spec:
      securityContext:
        fsGroup: 472
        runAsNonRoot: true
        runAsUser: 472
      containers:
        - name: grafana-ui
          image: grafana/grafana:10.4.0
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          ports:
            - containerPort: 3000
              name: http
              protocol: TCP
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1024Mi
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: storage-volume
              mountPath: /var/lib/grafana
            - name: datasources-volume
              mountPath: /etc/grafana/provisioning/datasources
            - name: dashboards-volume
              mountPath: /etc/grafana/provisioning/dashboards
            - name: tmp-volume
              mountPath: /tmp
      volumes:
        - name: storage-volume
          persistentVolumeClaim:
            claimName: grafana-storage-pvc
        - name: datasources-volume
          configMap:
            name: grafana-datasources-config
        - name: dashboards-volume
          configMap:
            name: grafana-dashboards-provider
        - name: tmp-volume
          emptyDir: {}
