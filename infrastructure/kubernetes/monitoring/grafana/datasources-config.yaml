apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources-config
  namespace: sentinel-monitoring
  labels:
    app.kubernetes.io/name: grafana
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://sentinel-prometheus.sentinel-monitoring.svc:9090
        isDefault: true
        jsonData:
          timeInterval: "15s"
      - name: Loki
        type: loki
        access: proxy
        url: http://loki.sentinel-monitoring.svc:3100
        jsonData:
          maxLines: 5000
      - name: Alertmanager
        type: alertmanager
        access: proxy
        url: http://alertmanager.sentinel-monitoring.svc:9093
