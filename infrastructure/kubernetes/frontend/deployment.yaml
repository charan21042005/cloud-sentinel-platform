apiVersion: apps/v1
kind: Deployment
metadata:
  name: sentinel-frontend
  namespace: platform-ops
  labels:
    app: sentinel-frontend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: sentinel-frontend
  template:
    metadata:
      labels:
        app: sentinel-frontend
    spec:
      containers:
        - name: nextjs-ui
          image: cloud-sentinel/frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          
          # Prevent cascading node failures
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          
          # Ensure traffic is only routed when the app is actually ready
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
          
          # Automatically reboot deadlocked containers
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 15

---
apiVersion: v1
kind: Service
metadata:
  name: sentinel-frontend-svc
  namespace: platform-ops
spec:
  selector:
    app: sentinel-frontend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000
  type: ClusterIP
