apiVersion: v1
kind: ConfigMap
metadata:
  name: api-gateway-config
  namespace: sentinel-apps
  labels:
    app.kubernetes.io/name: api-gateway
    app.kubernetes.io/part-of: cloud-sentinel
data:
  ENVIRONMENT: "production"
  LOG_LEVEL: "INFO"
  PROJECT_NAME: "Cloud Sentinel Real-Time SOC Gateway"
  WEBSOCKET_HEARTBEAT_INTERVAL_MS: "30000"
  ENABLE_CHAOS_CONTROLLER: "true"
  PROMETHEUS_METRICS_PATH: "/metrics"
