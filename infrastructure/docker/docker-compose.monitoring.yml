version: '3.8'

services:
  prometheus:
    image: prom/prometheus:v2.45.0
    container_name: sentinel-prometheus
    volumes:
      - ../monitoring/prometheus:/etc/prometheus
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
    ports:
      - "9090:9090"
    restart: unless-stopped
    networks:
      - cloud-sentinel-network

  grafana:
    image: grafana/grafana:10.1.1
    container_name: sentinel-grafana
    volumes:
      - grafana_data:/var/lib/grafana
      - ../monitoring/grafana/provisioning:/etc/grafana/provisioning
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=sentinel_admin
      - GF_USERS_ALLOW_SIGN_UP=false
    ports:
      - "3002:3000"
    restart: unless-stopped
    networks:
      - cloud-sentinel-network

  node-exporter:
    image: prom/node-exporter:latest
    container_name: sentinel-node-exporter
    pid: host
    volumes:
      - /:/rootfs:ro
    command:
      - '--path.rootfs=/rootfs'
    ports:
      - "9100:9100"
    restart: unless-stopped
    networks:
      - cloud-sentinel-network

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: sentinel-postgres-exporter
    environment:
      DATA_SOURCE_NAME: "postgresql://sentinel_user:sentinel_password@postgres:5432/cloud_sentinel?sslmode=disable"
    ports:
      - "9187:9187"
    restart: unless-stopped
    networks:
      - cloud-sentinel-network

  redis-exporter:
    image: oliver006/redis_exporter:latest
    container_name: sentinel-redis-exporter
    environment:
      REDIS_ADDR: "redis://redis:6379"
    ports:
      - "9121:9121"
    restart: unless-stopped
    networks:
      - cloud-sentinel-network

volumes:
  prometheus_data:
  grafana_data:

networks:
  cloud-sentinel-network:
    name: cloud-sentinel-network
    external: true
